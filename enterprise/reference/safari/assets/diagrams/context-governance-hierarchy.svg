<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cgh-bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="cgh-arrow-down" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <polygon points="0 0, 10 0, 5 8" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#cgh-bgGrad)"/>

  <!-- Title Section -->
  <text x="450" y="45" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Context Memory Hierarchy</text>
  <rect x="350" y="55" width="200" height="3" fill="#9B1C1C" rx="1.5"/>
  <text x="450" y="80" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="system-ui, sans-serif">4-Layer Memory Model — Higher layers override lower</text>

  <!-- Layer 1: Enterprise Policy (Widest) -->
  <g transform="translate(75, 110)">
    <rect width="750" height="95" fill="#1e293b" stroke="#9B1C1C" stroke-width="2" rx="12"/>
    <rect width="750" height="38" fill="#9B1C1C" rx="12" ry="12"/>
    <rect y="26" width="750" height="12" fill="#9B1C1C"/>
    <text x="375" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="system-ui, sans-serif">Layer 1: Enterprise Policy</text>
    <text x="720" y="27" text-anchor="end" fill="rgba(255,255,255,0.7)" font-size="11" font-family="system-ui, sans-serif">Highest Authority</text>
    <text x="375" y="58" text-anchor="middle" fill="#f1f5f9" font-size="12" font-family="system-ui, sans-serif">~/.claude/CLAUDE.md</text>
    <text x="375" y="80" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, sans-serif">Team standards  •  Infrastructure decisions  •  MCP integrations  •  Enforced best practices</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="205" x2="450" y2="218" stroke="#475569" stroke-width="2"/>
  <polygon points="445 218, 455 218, 450 228" fill="#475569"/>

  <!-- Layer 2: Project Memory -->
  <g transform="translate(125, 235)">
    <rect width="650" height="95" fill="#1e293b" stroke="#64748b" stroke-width="1.5" rx="12"/>
    <rect width="650" height="38" fill="#475569" rx="12" ry="12"/>
    <rect y="26" width="650" height="12" fill="#475569"/>
    <text x="325" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="system-ui, sans-serif">Layer 2: Project Memory</text>
    <text x="325" y="58" text-anchor="middle" fill="#f1f5f9" font-size="12" font-family="system-ui, sans-serif">{repo}/.claude/CLAUDE.md</text>
    <text x="325" y="80" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, sans-serif">Project-specific rules  •  Conventions  •  Architecture decisions</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="330" x2="450" y2="343" stroke="#475569" stroke-width="2"/>
  <polygon points="445 343, 455 343, 450 353" fill="#475569"/>

  <!-- Layer 3: Project Rules & Skills -->
  <g transform="translate(175, 360)">
    <rect width="550" height="95" fill="#1e293b" stroke="#64748b" stroke-width="1.5" rx="12"/>
    <rect width="550" height="38" fill="#475569" rx="12" ry="12"/>
    <rect y="26" width="550" height="12" fill="#475569"/>
    <text x="275" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="system-ui, sans-serif">Layer 3: Project Rules &amp; Skills</text>
    <text x="275" y="58" text-anchor="middle" fill="#f1f5f9" font-size="12" font-family="system-ui, sans-serif">~/.claude/skills/  •  ~/.claude/commands/</text>
    <text x="275" y="80" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, sans-serif">Reusable capabilities  •  Workflow commands  •  Pattern library</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="455" x2="450" y2="468" stroke="#475569" stroke-width="2"/>
  <polygon points="445 468, 455 468, 450 478" fill="#475569"/>

  <!-- Layer 4: User Memory & State (Narrowest) -->
  <g transform="translate(225, 485)">
    <rect width="450" height="95" fill="#1e293b" stroke="#64748b" stroke-width="1.5" rx="12"/>
    <rect width="450" height="38" fill="#475569" rx="12" ry="12"/>
    <rect y="26" width="450" height="12" fill="#475569"/>
    <text x="225" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="system-ui, sans-serif">Layer 4: User Memory &amp; State</text>
    <text x="225" y="58" text-anchor="middle" fill="#f1f5f9" font-size="12" font-family="system-ui, sans-serif">~/.claude/state/  •  ~/.claude/learning/</text>
    <text x="225" y="80" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="system-ui, sans-serif">Session state  •  Captured learnings  •  Runtime context</text>
  </g>

  <!-- Legend -->
  <g transform="translate(760, 320)">
    <rect width="110" height="130" fill="#0f172a" stroke="#334155" stroke-width="1" rx="8"/>
    <text x="55" y="25" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600" font-family="system-ui, sans-serif">Override Flow</text>

    <!-- Vertical arrow indicator -->
    <line x1="55" y1="45" x2="55" y2="95" stroke="#9B1C1C" stroke-width="2"/>
    <polygon points="50 95, 60 95, 55 105" fill="#9B1C1C"/>

    <text x="55" y="120" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">Higher overrides</text>
  </g>

  <!-- Safari Logo Mark -->
  <g transform="translate(830, 20)">
    <rect width="50" height="50" fill="#9B1C1C" rx="8"/>
    <text x="25" y="35" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="700" font-family="system-ui, sans-serif">S</text>
  </g>
</svg>
