<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9B1C1C"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="phaseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#0f172a"/>

  <!-- Title Header -->
  <rect x="0" y="0" width="1200" height="70" fill="url(#headerGradient)"/>
  <text x="600" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">
    Graph-Backed Unified Data Mart + Context Layer
  </text>

  <!-- Subtitle -->
  <text x="600" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    Option A: Metadata Graph | Extends IT Roadmap Phase 4 | 5 Implementation Phases
  </text>

  <!-- Central Graph Database -->
  <rect x="400" y="130" width="400" height="120" rx="10" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#60a5fa" text-anchor="middle">
    NEO4J UNIFIED GRAPH
  </text>
  <text x="600" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
    Metadata &amp; Relationships Only
  </text>

  <!-- Node Types in Graph -->
  <g transform="translate(420, 205)">
    <rect x="0" y="0" width="70" height="30" rx="5" fill="#9B1C1C"/>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" text-anchor="middle">:Dimension</text>
  </g>
  <g transform="translate(500, 205)">
    <rect x="0" y="0" width="50" height="30" rx="5" fill="#9B1C1C"/>
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" text-anchor="middle">:Fact</text>
  </g>
  <g transform="translate(560, 205)">
    <rect x="0" y="0" width="50" height="30" rx="5" fill="#34d399"/>
    <text x="25" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" text-anchor="middle">:Skill</text>
  </g>
  <g transform="translate(620, 205)">
    <rect x="0" y="0" width="55" height="30" rx="5" fill="#34d399"/>
    <text x="27" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" text-anchor="middle">:Policy</text>
  </g>
  <g transform="translate(685, 205)">
    <rect x="0" y="0" width="60" height="30" rx="5" fill="#60a5fa"/>
    <text x="30" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" text-anchor="middle">:Pipeline</text>
  </g>

  <!-- Three Ingest Paths -->
  <!-- Path 1: BI Inference -->
  <rect x="50" y="290" width="220" height="180" rx="8" fill="url(#phaseGradient)" stroke="#9B1C1C" stroke-width="2"/>
  <text x="160" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9B1C1C" text-anchor="middle">
    PATH 1: BI INFERENCE
  </text>
  <text x="160" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Ongoing Capability)</text>
  <line x1="70" y1="355" x2="250" y2="355" stroke="#334155" stroke-width="1"/>
  <text x="70" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0">
    <tspan x="70" dy="0">Power BI Semantic Models</tspan>
    <tspan x="70" dy="18">SSRS Reports</tspan>
    <tspan x="70" dy="18">SQL Views</tspan>
    <tspan x="70" dy="18">Acquisition BI Assets</tspan>
    <tspan x="70" dy="18">Business Sandbox</tspan>
  </text>

  <!-- Path 2: OpenMetadata -->
  <rect x="290" y="290" width="220" height="180" rx="8" fill="url(#phaseGradient)" stroke="#34d399" stroke-width="2"/>
  <text x="400" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#34d399" text-anchor="middle">
    PATH 2: OPENMETADATA
  </text>
  <text x="400" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Edge Inference)</text>
  <line x1="310" y1="355" x2="490" y2="355" stroke="#334155" stroke-width="1"/>
  <text x="310" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0">
    <tspan x="310" dy="0">SQL Lineage Detection</tspan>
    <tspan x="310" dy="18">Classifications → Labels</tspan>
    <tspan x="310" dy="18">Quality Metrics</tspan>
    <tspan x="310" dy="18">Ownership → Edges</tspan>
    <tspan x="310" dy="18">Safari MCP Adaptor</tspan>
  </text>

  <!-- Path 3: Streaming -->
  <rect x="530" y="290" width="220" height="180" rx="8" fill="url(#phaseGradient)" stroke="#60a5fa" stroke-width="2"/>
  <text x="640" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#60a5fa" text-anchor="middle">
    PATH 3: STREAMING
  </text>
  <text x="640" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(Real-Time Metadata)</text>
  <line x1="550" y1="355" x2="730" y2="355" stroke="#334155" stroke-width="1"/>
  <text x="550" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0">
    <tspan x="550" dy="0">Pipeline Catalog</tspan>
    <tspan x="550" dy="18">Kafka Topics</tspan>
    <tspan x="550" dy="18">Flink Jobs</tspan>
    <tspan x="550" dy="18">Iceberg Tables</tspan>
    <tspan x="550" dy="18">Trino Federation</tspan>
  </text>

  <!-- Path 4: Source Systems -->
  <rect x="770" y="290" width="220" height="180" rx="8" fill="url(#phaseGradient)" stroke="#f59e0b" stroke-width="2"/>
  <text x="880" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">
    PATH 4: SOURCES
  </text>
  <text x="880" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(CDC Discovery)</text>
  <line x1="790" y1="355" x2="970" y2="355" stroke="#334155" stroke-width="1"/>
  <text x="790" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0">
    <tspan x="790" dy="0">Plex ERP (REST/Webhooks)</tspan>
    <tspan x="790" dy="18">FourthShift (Debezium)</tspan>
    <tspan x="790" dy="18">BeFirst MES (SignalR)</tspan>
    <tspan x="790" dy="18">Field Mappings</tspan>
    <tspan x="790" dy="18">Source Entity Refs</tspan>
  </text>

  <!-- Arrows from paths to graph -->
  <path d="M 160 290 L 160 260 L 500 260 L 500 250" stroke="#9B1C1C" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M 400 290 L 400 260 L 550 260 L 550 250" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 640 290 L 640 260 L 650 260 L 650 250" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 880 290 L 880 260 L 700 260 L 700 250" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9B1C1C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Phase Timeline at Bottom -->
  <rect x="50" y="510" width="1100" height="30" rx="5" fill="#1e293b"/>
  <text x="600" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
    IMPLEMENTATION PHASES
  </text>

  <!-- Phase Boxes -->
  <g transform="translate(50, 550)">
    <!-- Phase 1 -->
    <rect x="0" y="0" width="200" height="80" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
    <text x="100" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">PHASE 1</text>
    <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Graph Infrastructure</text>
    <text x="100" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Neo4j + Schema</text>

    <!-- Phase 2 -->
    <rect x="220" y="0" width="200" height="80" rx="6" fill="#1e293b" stroke="#9B1C1C" stroke-width="2"/>
    <text x="320" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#9B1C1C" text-anchor="middle">PHASE 2</text>
    <text x="320" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">BI Inference Pipeline</text>
    <text x="320" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Ongoing Capability</text>

    <!-- Phase 3 -->
    <rect x="440" y="0" width="200" height="80" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="540" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">PHASE 3</text>
    <text x="540" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">OpenMetadata Sync</text>
    <text x="540" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Edge Inference</text>

    <!-- Phase 4 -->
    <rect x="660" y="0" width="200" height="80" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="760" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle">PHASE 4</text>
    <text x="760" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Streaming + Sources</text>
    <text x="760" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Plex/FS/BeFirst</text>

    <!-- Phase 5 -->
    <rect x="880" y="0" width="200" height="80" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="980" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">PHASE 5</text>
    <text x="980" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">SCL Extension</text>
    <text x="980" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Safari MCP Tools</text>
  </g>

  <!-- Connecting arrows between phases -->
  <path d="M 260 595 L 280 595" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 480 595 L 500 595" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 700 595 L 720 595" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 920 595 L 940 595" stroke="#334155" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>

  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- SCL Query Box -->
  <rect x="50" y="660" width="540" height="130" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="320" y="690" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa" text-anchor="middle">
    AGENTIC QUERY EXAMPLES (SCL + TRAVERSE)
  </text>
  <text x="70" y="720" font-family="monospace" font-size="11" fill="#34d399">
    <tspan x="70" dy="0">"What policies govern Customer data?"</tspan>
    <tspan x="70" dy="20">"Which pipelines produce Sales fact?"</tspan>
    <tspan x="70" dy="20">"What source fields feed Revenue KPI?"</tspan>
    <tspan x="70" dy="20">"Show PII columns with quality &lt; 80%"</tspan>
  </text>

  <!-- Key Benefits Box -->
  <rect x="610" y="660" width="540" height="130" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1"/>
  <text x="880" y="690" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#34d399" text-anchor="middle">
    KEY BENEFITS
  </text>
  <text x="630" y="720" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#e2e8f0">
    <tspan x="630" dy="0">Cross-domain lineage in single traversal</tspan>
    <tspan x="630" dy="20">OpenMetadata-inferred edges reduce manual work</tspan>
    <tspan x="630" dy="20">BI sandbox → production workflow supported</tspan>
    <tspan x="630" dy="20">Quality metrics enable data trust scoring</tspan>
  </text>

  <!-- Data stays in place note -->
  <rect x="820" y="130" width="330" height="60" rx="6" fill="#1e293b" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4"/>
  <text x="985" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
    Data stays in Iceberg / PostgreSQL
  </text>
  <text x="985" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
    Graph stores relationships only
  </text>

  <!-- Safari logo placeholder -->
  <text x="1150" y="880" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="end">
    Safari Circuits | 2026
  </text>
</svg>