    <text x="77" y="28" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600" font-family="system-ui, sans-serif">Commands</text>
    <text x="77" y="46" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui, sans-serif">User Actions</text>
    <text x="77" y="62" text-anchor="middle" fill="#64748b" font-size="9" font-family="system-ui, sans-serif">Workflow Integration</text>
