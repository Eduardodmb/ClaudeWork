  <!-- Background -->
  <rect width="900" height="750" fill="url(#cgo-bgGrad)"/>

  <!-- Title Section -->
  <text x="450" y="40" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="600" font-family="system-ui, -apple-system, sans-serif">Context Governance Architecture</text>
  <rect x="350" y="50" width="200" height="3" fill="#9B1C1C" rx="1.5"/>

  <!-- LLM Interfaces Layer (NEW) -->
