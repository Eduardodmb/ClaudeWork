  <line x1="302" y1="565" x2="380" y2="525" stroke="#64748b" stroke-width="1.5" marker-end="url(#cgo-arrow-slate)"/>
  <line x1="477" y1="565" x2="450" y2="525" stroke="#64748b" stroke-width="1.5" marker-end="url(#cgo-arrow-slate)"/>
  <line x1="652" y1="565" x2="520" y2="525" stroke="#64748b" stroke-width="1.5" marker-end="url(#cgo-arrow-slate)"/>
  <line x1="800" y1="565" x2="570" y2="525" stroke="#64748b" stroke-width="1.5" marker-end="url(#cgo-arrow-slate)"/>

