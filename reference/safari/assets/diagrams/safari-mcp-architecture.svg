<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9B1C1C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold" font-family="system-ui, sans-serif">
    Safari MCP - Internal Context Server
  </text>
  <text x="450" y="65" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="system-ui, sans-serif">
    Bridging Context Governance with Model Context Protocol
  </text>

  <!-- Safari Logo -->
  <circle cx="850" cy="40" r="25" fill="#9B1C1C" filter="url(#glow)"/>
  <text x="850" y="47" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold" font-family="system-ui, sans-serif">S</text>

  <!-- LLM Interfaces Box -->
  <rect x="200" y="90" width="500" height="60" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">
    LLM Interfaces
  </text>

  <!-- Interface items -->
  <rect x="220" y="120" width="100" height="20" rx="3" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="270" y="134" text-anchor="middle" fill="#60a5fa" font-size="10" font-family="system-ui, sans-serif">Claude Code</text>

  <rect x="330" y="120" width="100" height="20" rx="3" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="380" y="134" text-anchor="middle" fill="#34d399" font-size="10" font-family="system-ui, sans-serif">Claude API</text>

  <rect x="440" y="120" width="100" height="20" rx="3" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="490" y="134" text-anchor="middle" fill="#a78bfa" font-size="10" font-family="system-ui, sans-serif">Other LLMs</text>

  <rect x="550" y="120" width="100" height="20" rx="3" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
  <text x="600" y="134" text-anchor="middle" fill="#fb923c" font-size="10" font-family="system-ui, sans-serif">MCP Clients</text>

  <!-- Arrow from interfaces to Safari MCP -->
  <line x1="450" y1="150" x2="450" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Safari MCP Server Box -->
  <rect x="100" y="180" width="700" height="280" rx="8" fill="#0f172a" stroke="#9B1C1C" stroke-width="2"/>
  <rect x="100" y="180" width="700" height="35" rx="8" fill="#9B1C1C"/>
  <text x="450" y="204" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold" font-family="system-ui, sans-serif">
    Safari MCP Server
  </text>

  <!-- Resources Column -->
  <rect x="120" y="230" width="200" height="210" rx="6" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
