  <rect x="350" y="365" width="95" height="35" rx="3" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="397" y="382" text-anchor="middle" fill="#a78bfa" font-size="9" font-family="system-ui, sans-serif">LINK</text>
  <text x="397" y="395" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Lineage</text>

  <rect x="455" y="365" width="95" height="35" rx="3" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="502" y="382" text-anchor="middle" fill="#60a5fa" font-size="9" font-family="system-ui, sans-serif">CAPTURE</text>
