  </text>

  <!-- Context Sources -->
  <rect x="50" y="580" width="130" height="50" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="115" y="605" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" font-family="system-ui, sans-serif">CLAUDE.md</text>
  <text x="115" y="620" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Policy</text>

  <rect x="195" y="580" width="130" height="50" rx="4" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="260" y="605" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold" font-family="system-ui, sans-serif">Skills</text>
  <text x="260" y="620" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Capabilities</text>

  <rect x="340" y="580" width="130" height="50" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="405" y="605" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold" font-family="system-ui, sans-serif">Commands</text>
  <text x="405" y="620" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Actions</text>

  <rect x="485" y="580" width="130" height="50" rx="4" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
  <text x="550" y="605" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold" font-family="system-ui, sans-serif">Learning</text>
  <text x="550" y="620" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Auto-capture</text>

  <rect x="630" y="580" width="130" height="50" rx="4" fill="#0f172a" stroke="#f472b6" stroke-width="1"/>
  <text x="695" y="605" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="bold" font-family="system-ui, sans-serif">State</text>
  <text x="695" y="620" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Session</text>

  <!-- Arrows from sources to registry -->
