  <line x1="260" y1="580" x2="370" y2="560" stroke="#34d399" stroke-width="1"/>
  <line x1="405" y1="580" x2="450" y2="560" stroke="#a78bfa" stroke-width="1"/>
  <line x1="550" y1="580" x2="530" y2="560" stroke="#fb923c" stroke-width="1"/>
  <line x1="695" y1="580" x2="600" y2="560" stroke="#f472b6" stroke-width="1"/>

  <!-- Benefits callout -->
  <text x="815" y="180" fill="#e2e8f0" font-size="11" font-weight="bold" font-family="system-ui, sans-serif">Benefits</text>
  <text x="815" y="198" fill="#94a3b8" font-size="9" font-family="system-ui, sans-serif">Unified Access</text>
  <text x="815" y="212" fill="#94a3b8" font-size="9" font-family="system-ui, sans-serif">Governance</text>
  <text x="815" y="226" fill="#94a3b8" font-size="9" font-family="system-ui, sans-serif">Multi-LLM</text>
  <text x="815" y="240" fill="#94a3b8" font-size="9" font-family="system-ui, sans-serif">Auditability</text>
</svg>
