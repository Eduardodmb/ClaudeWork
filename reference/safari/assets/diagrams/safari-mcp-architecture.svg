  <rect x="340" y="230" width="220" height="210" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">
