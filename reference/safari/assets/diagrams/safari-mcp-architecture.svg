  <text x="502" y="342" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="system-ui, sans-serif">ALLOCATE</text>
  <text x="502" y="355" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Route</text>

