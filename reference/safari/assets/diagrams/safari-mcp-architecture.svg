  <text x="680" y="362" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">suggest-learning</text>

  <rect x="590" y="375" width="180" height="25" rx="3" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="680" y="392" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">audit-context</text>

  <rect x="590" y="405" width="180" height="25" rx="3" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="680" y="422" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">resolve-conflict</text>

