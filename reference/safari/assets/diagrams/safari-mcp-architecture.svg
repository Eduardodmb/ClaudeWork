  <rect x="350" y="285" width="95" height="35" rx="3" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
  <text x="397" y="302" text-anchor="middle" fill="#fb923c" font-size="9" font-family="system-ui, sans-serif">SELECT</text>
  <text x="397" y="315" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Query</text>

  <rect x="455" y="285" width="95" height="35" rx="3" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="502" y="302" text-anchor="middle" fill="#34d399" font-size="9" font-family="system-ui, sans-serif">RESOLVE</text>
  <text x="502" y="315" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui, sans-serif">Dependencies</text>

