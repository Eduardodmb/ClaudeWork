  <text x="220" y="302" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">enterprise-policy</text>

  <rect x="130" y="315" width="180" height="25" rx="3" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="332" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">project/{repo}</text>

  <rect x="130" y="345" width="180" height="25" rx="3" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="362" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">skill/{name}</text>

  <rect x="130" y="375" width="180" height="25" rx="3" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="392" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">command/{name}</text>

  <rect x="130" y="405" width="180" height="25" rx="3" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="422" text-anchor="middle" fill="#e2e8f0" font-size="9" font-family="system-ui, sans-serif">registry | state/*</text>

